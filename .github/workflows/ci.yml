name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache de build Next
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  e2e:
    name: E2E smoke (no bloqueante por ahora)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'
    # Promover a requerido (quitar esta línea) cuando se confirme estable.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      # Node 22: supabase-js >=2.1xx inicializa Realtime en `createClient` y
      # requiere WebSocket nativo (ausente en Node 20). Ver issue #94.
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest
          # Autentica la consulta a la API de GitHub que resuelve "latest" (5000/h vs 60/h sin token).
          github-token: ${{ github.token }}
        env:
          # Autentica la consulta a la API de GitHub que resuelve el release
          # "latest"; sin token pega contra el límite de 60/h por IP del runner.
          SUPABASE_CLI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Levantar Supabase local + migraciones
        run: |
          supabase start
          supabase migration up --local
          # Exporta URL + claves del stack efímero al entorno del job.
          # `supabase status -o env` entrecomilla los valores ("..."); hay que
          # quitar las comillas o GITHUB_ENV las conserva literales y rompen la
          # validación de URL en supabase-js (issue #94).
          # El seeder usa SUPABASE_URL/SERVICE_ROLE_KEY; el dev server (npm run
          # dev) lee NEXT_PUBLIC_SUPABASE_URL/ANON_KEY en runtime para el login.
          supabase status -o env | while IFS='=' read -r key val; do
            val="${val%\"}"; val="${val#\"}"
            case "$key" in
              API_URL)
                echo "SUPABASE_URL=$val"
                echo "NEXT_PUBLIC_SUPABASE_URL=$val"
                ;;
              ANON_KEY) echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$val" ;;
              SERVICE_ROLE_KEY) echo "SUPABASE_SERVICE_ROLE_KEY=$val" ;;
              DB_URL) echo "DB_URL=$val" ;;
            esac
          done >> "$GITHUB_ENV"

      # Los grants a los roles de Supabase ahora viven en la migración
      # 20260620000001_grants_public_roles.sql (issue #98), así que `supabase
      # migration up` los aplica; ya no hace falta el paso de psql aquí.

      - name: Seed usuario E2E
        run: node scripts/seed-e2e-user.mjs
        env:
          E2E_EMAIL: ${{ vars.E2E_EMAIL || 'e2e@ci.local' }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

      # Datos mínimos para el smoke: un ingreso (para que health.hasData sea
      # true y /dashboard pinte el HERO en vez del EmptyState) y un holding
      # (para que /patrimonio liste una posición). Vía psql como superusuario:
      # ni service_role ni authenticated tienen grant de INSERT en el stack
      # local. Idempotente (no-op si el usuario ya tiene esos datos).
      - name: Seed datos E2E (ingreso + holding vía SQL superuser)
        env:
          E2E_EMAIL: ${{ vars.E2E_EMAIL || 'e2e@ci.local' }}
        run: >
          psql "$DB_URL" -v ON_ERROR_STOP=1
          -c "insert into public.income_sources (user_id, name, income_type, amount, currency, frequency, is_fixed, owner_scope, include_in_budget, amount_monthly_base)
          select u.id, 'Salario E2E', 'activo', 1000000, 'CRC', 'mensual', true, 'usuario', true, 1000000
          from auth.users u
          where u.email = '$E2E_EMAIL'
          and not exists (select 1 from public.income_sources i where i.user_id = u.id);
          insert into public.investment_holdings (user_id, symbol, asset_type, quantity, average_cost, cost_basis, currency, label)
          select u.id, 'VOO', 'etf', 10, 400, 4000, 'USD', 'VOO'
          from auth.users u
          where u.email = '$E2E_EMAIL'
          and not exists (select 1 from public.investment_holdings h where h.user_id = u.id);"

      - name: Navegador Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E
        run: npx playwright test
        env:
          E2E_EMAIL: ${{ vars.E2E_EMAIL || 'e2e@ci.local' }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

      # Evidencia del fallo: Playwright ya guarda screenshot + trace en
      # /tmp/compound-e2e-results (only-on-failure / retain-on-failure); sin
      # subirlos no se pueden inspeccionar. Útil para diagnosticar el smoke.
      - name: Subir evidencia E2E (si falla)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-playwright-results
          path: /tmp/compound-e2e-results
          retention-days: 7
          if-no-files-found: ignore
