name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache de build Next
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  e2e:
    name: E2E smoke (no bloqueante por ahora)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'
    # Promover a requerido (quitar esta línea) cuando se confirme estable.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Levantar Supabase local + migraciones
        run: |
          supabase start
          supabase migration up --local
          # Exporta URL + service-role del stack efímero al entorno del job.
          # `supabase status -o env` entrecomilla los valores ("..."); hay que
          # quitar las comillas o GITHUB_ENV las conserva literales y rompen la
          # validación de URL en supabase-js (issue #94).
          supabase status -o env | while IFS='=' read -r key val; do
            val="${val%\"}"; val="${val#\"}"
            case "$key" in
              API_URL) echo "SUPABASE_URL=$val" ;;
              SERVICE_ROLE_KEY) echo "SUPABASE_SERVICE_ROLE_KEY=$val" ;;
            esac
          done >> "$GITHUB_ENV"

      - name: Seed usuario E2E
        run: node scripts/seed-e2e-user.mjs
        env:
          E2E_EMAIL: ${{ vars.E2E_EMAIL || 'e2e@ci.local' }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

      - name: Navegador Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E
        run: npx playwright test
        env:
          E2E_EMAIL: ${{ vars.E2E_EMAIL || 'e2e@ci.local' }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
